services:
  market_sim:
    build: ./market_sim
    ports: ["8001:8001"]
    restart: unless-stopped

  fund:
    build: .
    depends_on: [market_sim]
    env_file: .env
    volumes:
      - fund_data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    depends_on: [fund]
    env_file: .env
    ports: ["8080:8080"]
    volumes:
      - fund_data:/data
    restart: unless-stopped

volumes:
  fund_data:
