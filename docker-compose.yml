services:

  market_sim:
    build:
      context: ./market_sim
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped

  fund:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - market_sim
    env_file:
      - .env
    environment:
      MARKET_SIM_URL: http://market_sim:8001
      DB_PATH: /data/fund.db
    ports:
      - "8002:8002"        # Control API — /status, /stop, /resume, /spend, /decisions
    volumes:
      - fund_data:/data
    restart: unless-stopped
    command: python run.py

volumes:
  fund_data:
